name: SSH Buddy CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:

  # ── Job 1: Code Quality ─────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install flake8 pylint

      - name: flake8 (style check)
        run: flake8 . --max-line-length=120 --exclude=__pycache__ --statistics
        continue-on-error: true

      - name: pylint (code quality)
        run: pylint src/ssh_buddy/*.py *.py --disable=C0114,C0115,C0116,W0611 --max-line-length=120
        continue-on-error: true

  # ── Job 2: Security Scan ────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit (Python security scan)
        run: bandit -r . -ll -ii --exclude ./.git
        continue-on-error: true

      - name: Safety (dependency vulnerability check)
        run: safety check -r requirements.txt
        continue-on-error: true

  # ── Job 3: Basic Test ───────────────────────────────────────
  test:
    name: Basic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install keyring keyrings.alt

      - name: Test imports
        working-directory: src
        run: |
          python -c "from ssh_buddy import db; db.init_db(); print('db.py OK')"
          python -c "from ssh_buddy import keystore; print('keystore.py OK')"
          python -c "from ssh_buddy import connector; print('connector.py OK')"
          python -c "from ssh_buddy import cli; print('cli.py OK')"

      - name: Test DB operations
        working-directory: src
        run: |
          python -c "
          from ssh_buddy import db
          db.init_db()
          ok, msg = db.add_server('test-server', '1.2.3.4', 'admin', 22, 'test', 'test note')
          assert ok, msg
          servers = db.get_all_servers()
          assert len(servers) == 1
          db.delete_server('test-server')
          print('All DB tests passed!')
          "

  # ── Job 4: Build Artifact ───────────────────────────────────
  build:
    name: Build ZIP
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@v4

      - name: Create release ZIP
        run: |
          mkdir -p dist
          zip -r dist/ssh-buddy-${{ github.sha }}.zip . \
            --exclude "*.git*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "dist/*" \
            --exclude ".github/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-buddy-build
          path: dist/ssh-buddy-*.zip
          retention-days: 30

  # ── Job 5: Publish Release (on Tag) ─────────────────────────
  publish-release:
    name: Publish Public Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ssh-buddy-build
          path: dist/

      - name: Create Public Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SSH Buddy ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
